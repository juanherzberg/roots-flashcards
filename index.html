<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roots Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; padding: 24px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* LANDING */
  #landing { background: #F8FAFC; }
  .landing-title { font-size: 2.2rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; text-align: center; }
  .landing-subtitle { font-size: 1rem; color: #64748B; margin-bottom: 48px; text-align: center; }
  .landing-buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 380px; }
  .btn-landing { padding: 20px 32px; border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; color: white; letter-spacing: 0.02em; }
  .btn-landing:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .btn-landing:active { transform: translateY(0); }
  .btn-prefix { background: #3B82F6; }
  .btn-suffix { background: #10B981; }
  .btn-bases { background: #F59E0B; }

  /* SUBMENU */
  #base-submenu { background: #FFFBEB; }
  .submenu-title { font-size: 1.8rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; text-align: center; }
  .submenu-subtitle { font-size: 0.95rem; color: #64748B; margin-bottom: 36px; text-align: center; }
  .submenu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 380px; }
  .btn-group { padding: 16px 24px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; background: #F59E0B; color: white; transition: transform 0.15s, box-shadow 0.15s; }
  .btn-group:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(245,158,11,0.3); }
  .btn-group:active { transform: translateY(0); }
  .btn-back { padding: 12px 24px; border: 2px solid #D1D5DB; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: white; color: #374151; margin-top: 8px; transition: background 0.15s; }
  .btn-back:hover { background: #F9FAFB; }

  /* CARD SCREEN */
  #card-screen { background: #F8FAFC; padding: 16px; }
  .card-header { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .progress-text { font-size: 0.9rem; font-weight: 600; color: #64748B; }
  .progress-bar-container { width: 100%; max-width: 600px; height: 6px; background: #E2E8F0; border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  /* FLIP CARD */
  .flip-card-wrapper { width: 100%; max-width: 600px; perspective: 1200px; margin-bottom: 24px; }
  .flip-card { position: relative; width: 100%; min-height: 380px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .flip-card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; min-height: 380px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; padding: 36px 32px; display: flex; flex-direction: column; }
  .card-front { background: white; border: 3px solid #E2E8F0; }
  .card-back { background: white; border: 3px solid #E2E8F0; transform: rotateY(180deg); }

  /* Dynamic border color via JS */
  .card-face.themed { border-color: var(--cat-color); }

  .card-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 12px; }
  .card-root { font-size: 3rem; font-weight: 900; color: #1E293B; margin-bottom: 24px; letter-spacing: -0.02em; }
  .card-prompt { font-size: 0.9rem; color: #64748B; margin-bottom: 12px; font-style: italic; }
  .card-textarea { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 1rem; font-family: inherit; resize: none; min-height: 90px; color: #1E293B; transition: border-color 0.2s; outline: none; }
  .card-textarea:focus { border-color: var(--cat-color, #3B82F6); }
  .card-textarea:disabled { background: #F8FAFC; color: #64748B; cursor: not-allowed; }
  .card-submit { margin-top: 16px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s, transform 0.15s; align-self: flex-start; }
  .card-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .card-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-see-answer { margin-top: 12px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s, transform 0.15s; align-self: flex-start; display: none; }
  .btn-see-answer:hover { opacity: 0.9; transform: translateY(-1px); }

  /* BACK FACE */
  .card-meaning-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 4px; }
  .card-meaning { font-size: 1.4rem; font-weight: 800; color: #1E293B; margin-bottom: 20px; }
  .card-sentences-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 10px; }
  .card-sentence { font-size: 0.95rem; color: #374151; line-height: 1.6; padding: 10px 14px; background: var(--cat-bg, #EFF6FF); border-radius: 8px; margin-bottom: 8px; }

  /* CARD ACTIONS */
  .card-actions { width: 100%; max-width: 600px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-flip-back { padding: 12px 24px; border: 2px solid #D1D5DB; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; background: white; color: #374151; transition: background 0.15s; }
  .btn-flip-back:hover { background: #F9FAFB; }
  .btn-next { padding: 12px 28px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s, transform 0.15s; }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* HOME BUTTON */
  .btn-home { position: fixed; top: 16px; left: 16px; padding: 8px 16px; border: 2px solid #D1D5DB; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: white; color: #374151; z-index: 100; transition: background 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; }
  .btn-home:hover { background: #F9FAFB; }
  .btn-home.visible { display: block; }

  /* END SCREEN */
  .end-card { background: white; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .end-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .end-title { font-size: 1.8rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; }
  .end-subtitle { font-size: 1rem; color: #64748B; margin-bottom: 32px; }
  .end-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-restart { padding: 14px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s; }
  .btn-restart:hover { opacity: 0.9; }
  .btn-end-home { padding: 14px 28px; border: 2px solid #D1D5DB; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; background: white; color: #374151; transition: background 0.15s; }
  .btn-end-home:hover { background: #F9FAFB; }
</style>
</head>
<body>

<!-- HOME BUTTON (always visible on non-landing screens) -->
<button class="btn-home" id="btn-home" onclick="goHome()">← Home</button>

<!-- LANDING SCREEN -->
<div class="screen active" id="landing">
  <div class="landing-title">Roots Flashcards</div>
  <div class="landing-subtitle">Master prefixes, suffixes, and bases</div>
  <div class="landing-buttons">
    <button class="btn-landing btn-prefix" onclick="startDeck('prefixes')">Prefixes</button>
    <button class="btn-landing btn-suffix" onclick="startDeck('suffixes')">Suffixes</button>
    <button class="btn-landing btn-bases" onclick="showBaseSubmenu()">Bases</button>
  </div>
</div>

<!-- BASE SUBMENU SCREEN -->
<div class="screen" id="base-submenu">
  <div class="submenu-title">Bases</div>
  <div class="submenu-subtitle">Choose a group to study</div>
  <div class="submenu-buttons">
    <button class="btn-group" onclick="startBaseGroup(0,49)">Group 1 — Most Common (1–50)</button>
    <button class="btn-group" onclick="startBaseGroup(50,99)">Group 2 (51–100)</button>
    <button class="btn-group" onclick="startBaseGroup(100,149)">Group 3 (101–150)</button>
    <button class="btn-group" onclick="startBaseGroup(150,199)">Group 4 (151–200)</button>
    <button class="btn-group" onclick="startBaseGroup(200,249)">Group 5 (201–250)</button>
    <button class="btn-group" onclick="startBaseGroup(250,297)">Group 6 (251–298)</button>
    <button class="btn-back" onclick="goHome()">← Back</button>
  </div>
</div>

<!-- CARD SCREEN -->
<div class="screen" id="card-screen">
  <div class="card-header">
    <span class="progress-text" id="progress-text">Card 1 of 50</span>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="flip-card-wrapper">
    <div class="flip-card" id="flip-card">
      <!-- FRONT -->
      <div class="card-face card-front" id="card-front">
        <div class="card-label" id="front-label">PREFIX</div>
        <div class="card-root" id="card-root">UN-</div>
        <div class="card-prompt">Write 2–3 example words using this root:</div>
        <textarea class="card-textarea" id="card-textarea" placeholder="e.g. unhappy, unkind, uncertain..."></textarea>
        <button class="card-submit" id="btn-submit" onclick="submitAnswer()">Submit</button>
        <button class="btn-see-answer" id="btn-see-answer" onclick="flipCard()">See the answer →</button>
      </div>
      <!-- BACK -->
      <div class="card-face card-back" id="card-back">
        <div class="card-meaning-label">Meaning</div>
        <div class="card-meaning" id="card-meaning">not</div>
        <div class="card-sentences-label">Example Sentences</div>
        <div class="card-sentence" id="card-sentence-1"></div>
        <div class="card-sentence" id="card-sentence-2"></div>
      </div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-flip-back" id="btn-flip-back" onclick="flipBack()" style="display:none">← Flip Back</button>
    <button class="btn-next" id="btn-next" onclick="nextCard()" style="display:none">Next Card →</button>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen" id="end-screen">
  <div class="end-card">
    <div class="end-icon">🎉</div>
    <div class="end-title">Deck Complete!</div>
    <div class="end-subtitle" id="end-subtitle">You reviewed all the cards.</div>
    <div class="end-buttons">
      <button class="btn-restart" onclick="restartDeck()">Start Over</button>
      <button class="btn-end-home" onclick="goHome()">← Home</button>
    </div>
  </div>
</div>


<script>
// ============================================================
// DATA
// ============================================================

const PREFIXES = [
  { root: "UN-", meaning: "not", s1: "The senator's unethical behavior was widely condemned.", s2: "Her unusual approach to problem-solving impressed the entire team." },
  { root: "RE-", meaning: "again", s1: "The scientist decided to redo the experiment after the results were questioned.", s2: "The city hired contractors to rebuild the bridge after the flood." },
  { root: "IN-, IL-, IM-, IR-", meaning: "in or not", s1: "The judge declared the contract invalid due to missing signatures.", s2: "His inability to focus cost him the promotion." },
  { root: "DIS-", meaning: "apart, away", s1: "The new evidence seemed to discredit the prosecution's case.", s2: "She tried to disguise her disappointment with a smile." },
  { root: "PRE-, PRO-", meaning: "before", s1: "The professor asked students to preview the chapter before class.", s2: "Proper preparation prevents poor performance." },
  { root: "DE-", meaning: "down, from", s1: "Rising temperatures are beginning to degrade the coral reef ecosystem.", s2: "The corrupt official was forced to depart from his position." },
  { root: "INTER-", meaning: "between", s1: "The two countries signed an international trade agreement.", s2: "The professor encouraged interaction between students during seminars." },
  { root: "TRANS-", meaning: "across", s1: "The surgeon performed a complex transplant surgery.", s2: "Translating poetry requires an understanding of both languages and cultures." },
  { root: "OVER- / HYPER-", meaning: "excess", s1: "Critics argued that the film was overhyped before its release.", s2: "Her hyperactive imagination made her an exceptional storyteller." },
  { root: "SUPER-", meaning: "exceed, over", s1: "The superhuman effort required to climb Everest is difficult to comprehend.", s2: "The new model is superior to anything previously on the market." },
  { root: "ANTI-", meaning: "against, opposite", s1: "The town organized an antiwar demonstration in the central plaza.", s2: "She took an antihistamine to relieve her allergy symptoms." },
  { root: "MULTI-", meaning: "many", s1: "The company adopted a multilingual customer service policy.", s2: "His multifaceted personality made him popular in every social circle." },
  { root: "MICRO-", meaning: "small", s1: "Scientists used a microscope to examine the bacterial cells.", s2: "The microchip revolutionized the electronics industry." },
  { root: "AUTO-", meaning: "self", s1: "The automobile transformed how people travel and live.", s2: "She wrote an autobiography detailing her journey from poverty to success." },
  { root: "CO-, COM-, CON-", meaning: "with", s1: "The two researchers decided to collaborate on the groundbreaking study.", s2: "The construction of the new stadium took over three years." },
  { root: "SUB-", meaning: "below", s1: "The submarine navigated silently beneath the Arctic ice.", s2: "She could only find a substandard apartment within her budget." },
  { root: "MIS-", meaning: "against, wrong", s1: "He misunderstood the directions and ended up miles off course.", s2: "The politician's misstep cost him significant support in the polls." },
  { root: "NON-", meaning: "not", s1: "The organization was granted nonprofit status by the government.", s2: "The nonfiction section of the library was her favorite browsing spot." },
  { root: "POST-", meaning: "after", s1: "The country struggled with postwar economic recovery for decades.", s2: "Doctors recommended a postoperative regimen of rest and light exercise." },
  { root: "EN-, EM-", meaning: "in", s1: "The new policy was designed to empower local communities.", s2: "The artist wanted to encapsulate the spirit of the era in a single painting." },
  { root: "POLY-", meaning: "many", s1: "The polyglot spoke seven languages fluently.", s2: "Polygamy is illegal in most countries around the world." },
  { root: "MONO-", meaning: "one", s1: "The monotone lecture put half the audience to sleep.", s2: "A monopoly stifles competition and harms consumers." },
  { root: "BI-", meaning: "two", s1: "Bilingual children often demonstrate greater cognitive flexibility.", s2: "The bicycle was the primary mode of transport for working-class families." },
  { root: "TELE-", meaning: "distant", s1: "The telescope allowed astronomers to observe distant galaxies.", s2: "Television transformed how people received news and entertainment." },
  { root: "EXTRA-", meaning: "outside", s1: "Her extraordinary talent was recognized at a very young age.", s2: "The details of the mission were kept strictly extracurricular to the public record." },
  { root: "MACRO-, MEGA-", meaning: "large", s1: "Economists study macroeconomic trends to predict recessions.", s2: "The megacity of Tokyo houses over thirty million people." },
  { root: "CIRCUM-", meaning: "around", s1: "The ship completed its circumnavigation of the globe in record time.", s2: "Circumspect leaders consider all consequences before acting." },
  { root: "META-", meaning: "change", s1: "Metamorphosis describes the dramatic transformation insects undergo.", s2: "The author's use of metaphor elevated the text beyond its literal meaning." },
  { root: "OMNI-", meaning: "all", s1: "The omniscient narrator knows the thoughts of every character.", s2: "An omnivore consumes both plants and animals." },
  { root: "PAN-", meaning: "all", s1: "The pandemic spread rapidly across every continent.", s2: "A panoramic view of the valley stretched out before the hikers." },
  { root: "SYM-, SYN-", meaning: "same, together", s1: "A symphony brings together dozens of instruments into one sound.", s2: "The doctors used a synonym chart to clarify the patient's diagnosis." },
  { root: "PSEUDO-", meaning: "false", s1: "The pseudoscientific claims in the article lacked any credible evidence.", s2: "He used a pseudonym to publish his early poetry anonymously." },
  { root: "CONTRA-", meaning: "against", s1: "Her actions seemed to contradict everything she had previously said.", s2: "The contraband was discovered hidden in a false compartment." },

  { root: "HETERO-", meaning: "different", s1: "The heterogeneous group brought together people from dozens of backgrounds.", s2: "A heterodox thinker challenges conventional wisdom." },
  { root: "HOMO-", meaning: "same", s1: "The homogeneous mixture contained only one type of substance.", s2: "Homogenized milk has been processed so the fat is evenly distributed." },
  { root: "PERI-", meaning: "all around", s1: "The perimeter of the field was marked with orange cones.", s2: "Peripheral vision allows us to detect movement at the edges of our sight." },
  { root: "FORE-", meaning: "before", s1: "The detective had a foreboding sense that something was wrong.", s2: "Foresight is more valuable than any amount of hindsight." },
  { root: "UNI-", meaning: "one", s1: "The country adopted a uniform national curriculum for all schools.", s2: "A unicorn is a mythical creature with a single horn." },
  { root: "NEO-", meaning: "new", s1: "The neoclassical building featured columns and symmetrical facades.", s2: "Her neologism for the phenomenon was quickly adopted online." },
  { root: "PROT-", meaning: "first", s1: "The prototype for the new phone was unveiled at the tech conference.", s2: "Protein is essential because amino acids are the building blocks of life." },
  { root: "AMBI-, AMPHI-", meaning: "both", s1: "He was ambidextrous and could write equally well with either hand.", s2: "She felt ambivalent about accepting the prestigious but demanding position." },
  { root: "E-, EX-", meaning: "outer, exit", s1: "The company decided to export its products to new markets abroad.", s2: "His exclamation of surprise echoed through the empty hall." },
  { root: "ANTE-", meaning: "before", s1: "The antechamber served as a waiting room before the main hall.", s2: "Antebellum architecture is a defining feature of the old Southern estates." },
  { root: "INTR-", meaning: "within", s1: "She is an introvert who finds large social gatherings exhausting.", s2: "Introspection is the process of examining one's own thoughts and feelings." },
  { root: "DI-, DIS-", meaning: "apart, away", s1: "The two paths diverged at the edge of the forest.", s2: "The dilemma left her unable to choose between two equally appealing options." },
  { root: "DYS-", meaning: "bad", s1: "Dyslexia affects the way some individuals process written language.", s2: "A dysfunctional family environment can have lasting effects on a child." },
  { root: "EPI-", meaning: "after", s1: "The epilogue revealed what happened to the characters years later.", s2: "An epidemic of influenza swept through the city in the winter months." },
  { root: "EU-", meaning: "good", s1: "The eulogy delivered at the funeral moved the entire audience to tears.", s2: "Euphoria swept through the crowd as the final buzzer sounded." },
  { root: "ALT-", meaning: "other", s1: "The alternate route added twenty minutes to the commute.", s2: "An altruistic person places the well-being of others above their own interests." },
  { root: "AB-", meaning: "from", s1: "She was absent from school for an entire week due to illness.", s2: "The abstract painting provoked strong reactions from gallery visitors." },
  { root: "DI-, DU-", meaning: "two", s1: "The duplex housed two families on opposite sides of the building.", s2: "A duet requires two performers working in perfect harmony." },
  { root: "BE-", meaning: "make", s1: "The knight was bequeathed a vast estate by his grateful king.", s2: "Her cheerful demeanor befriended everyone she met." },
  { root: "BY-", meaning: "near", s1: "The bystander filmed the incident on his phone.", s2: "They took a bypass to avoid the congested downtown area." },
  { root: "IR-", meaning: "not", s1: "The irreversible damage to the ecosystem alarmed scientists worldwide.", s2: "Her irresponsible spending habits led to serious financial problems." },
  { root: "NE-, NEG-", meaning: "not", s1: "He gave a negative review of the film in his weekly column.", s2: "Negligence in the workplace can lead to serious accidents." },
  { root: "OFF-", meaning: "from", s1: "The offshoot of the organization was established to handle local issues.", s2: "An offhand remark unintentionally offended several colleagues." },
  { root: "RE-, RETRO-", meaning: "back", s1: "Retrofitting older buildings with modern insulation saves energy.", s2: "The retrospective exhibit traced the artist's development over four decades." },
  { root: "SE-", meaning: "away", s1: "The two countries agreed to secede from the economic union.", s2: "She sought seclusion in a mountain cabin to finish writing her novel." },
  { root: "ULT-", meaning: "beyond", s1: "The ultramarathon required participants to run one hundred miles.", s2: "The ultimate goal of the program is to achieve energy independence." },
  { root: "WITH-", meaning: "back, away", s1: "He decided to withdraw his application before the deadline.", s2: "She chose to withhold her opinion until all the evidence was presented." }
];

const SUFFIXES = [
  { root: "-TION, -SION", meaning: "state of, act of", s1: "The construction of the new highway took three years to complete.", s2: "Her passion for justice led her to pursue a career in law." },
  { root: "-NESS", meaning: "quality, state of", s1: "The witness described the darkness of the tunnel with a shudder.", s2: "His kindness toward strangers was well known throughout the neighborhood." },
  { root: "-LY", meaning: "resembling", s1: "She spoke quietly so as not to disturb the sleeping child.", s2: "The candidate responded carefully to each of the journalist's questions." },
  { root: "-MENT", meaning: "action, state", s1: "The government announced a new agreement with the neighboring country.", s2: "Her improvement in mathematics over the semester surprised even her teacher." },
  { root: "-ABLE, -IBLE", meaning: "capable of", s1: "The flexible schedule made the job more manageable for working parents.", s2: "The evidence was irrefutable and the jury reached a swift verdict." },
  { root: "-IOUS, -OUS", meaning: "full of", s1: "The courageous firefighter rescued three people from the burning building.", s2: "The notorious criminal was finally captured after a decade on the run." },
  { root: "-ITY", meaning: "state of", s1: "The university celebrated its centennial with a week of special events.", s2: "Clarity of expression is the hallmark of good academic writing." },
  { root: "-ER, -OR", meaning: "one who does", s1: "The professor published a groundbreaking paper on quantum mechanics.", s2: "A good instructor knows how to adapt explanations to different learners." },
  { root: "-AL, -IAL", meaning: "pertaining to", s1: "The proposal received widespread approval from the editorial board.", s2: "Criminal behavior is influenced by both biological and environmental factors." },
  { root: "-FUL", meaning: "full of", s1: "A resourceful student can find ways to learn even without expensive materials.", s2: "The colorful mural brightened the previously drab wall of the building." },
  { root: "-LESS", meaning: "without", s1: "The careless mistake cost the company millions of dollars.", s2: "She felt powerless in the face of the sweeping administrative changes." },
  { root: "-ATION, -IATION", meaning: "action, process of", s1: "The exploration of the deep ocean has only just begun.", s2: "Vaccination programs have dramatically reduced childhood mortality worldwide." },
  { root: "-ANCE, -ANCY", meaning: "quality, state of", s1: "His brilliance and confidence made a strong first impression.", s2: "The redundancy of the argument weakened the overall thesis considerably." },
  { root: "-ENCE, -ENCY", meaning: "quality, state of", s1: "The independence of the judiciary is essential to a functioning democracy.", s2: "Her competence in the field earned her a promotion within months." },

// ============================================================
// APP STATE
// ============================================================

const CATEGORY_COLORS = {
  prefixes: { color: '#3B82F6', bg: '#EFF6FF', label: 'PREFIX' },
  suffixes: { color: '#10B981', bg: '#ECFDF5', label: 'SUFFIX' },
  bases:    { color: '#F59E0B', bg: '#FFFBEB', label: 'BASE' }
};

let currentDeck = [];
let currentIndex = 0;
let currentCategory = 'prefixes';
let isFlipped = false;
let submitted = false;
let savedDeckStart = 0;
let savedDeckEnd = 0;

// ============================================================
// NAVIGATION
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const homeBtn = document.getElementById('btn-home');
  homeBtn.classList.toggle('visible', id !== 'landing');
}

function goHome() {
  showScreen('landing');
}

function showBaseSubmenu() {
  showScreen('base-submenu');
}

function startDeck(category) {
  currentCategory = category;
  let deck;
  if (category === 'prefixes') deck = PREFIXES;
  else if (category === 'suffixes') deck = SUFFIXES;
  else deck = BASES;
  currentDeck = deck;
  currentIndex = 0;
  applyTheme(category);
  showCard();
  showScreen('card-screen');
}

function startBaseGroup(start, end) {
  currentCategory = 'bases';
  currentDeck = BASES.slice(start, end + 1);
  savedDeckStart = start;
  savedDeckEnd = end;
  currentIndex = 0;
  applyTheme('bases');
  showCard();
  showScreen('card-screen');
}

// ============================================================
// THEME
// ============================================================

function applyTheme(category) {
  const theme = CATEGORY_COLORS[category];
  document.documentElement.style.setProperty('--cat-color', theme.color);
  document.documentElement.style.setProperty('--cat-bg', theme.bg);
  // Apply themed border to card faces
  document.querySelectorAll('.card-face').forEach(el => {
    el.style.borderColor = theme.color;
  });
  // Color progress bar
  document.getElementById('progress-bar').style.background = theme.color;
}

// ============================================================
// CARD DISPLAY
// ============================================================

function showCard() {
  const card = currentDeck[currentIndex];
  const theme = CATEGORY_COLORS[currentCategory];
  const total = currentDeck.length;

  // Reset flip state
  isFlipped = false;
  submitted = false;
  document.getElementById('flip-card').classList.remove('flipped');

  // Front content
  document.getElementById('front-label').textContent = theme.label;
  document.getElementById('card-root').textContent = card.root;

  // Reset textarea
  const ta = document.getElementById('card-textarea');
  ta.value = '';
  ta.disabled = false;
  ta.style.borderColor = '';

  // Reset buttons
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('btn-submit').style.display = 'inline-block';
  document.getElementById('btn-see-answer').style.display = 'none';

  // Back content
  document.getElementById('card-meaning').textContent = card.meaning;
  document.getElementById('card-sentence-1').textContent = card.s1;
  document.getElementById('card-sentence-2').textContent = card.s2;

  // Hide flip-back and next on fresh card
  document.getElementById('btn-flip-back').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  // Progress
  document.getElementById('progress-text').textContent = `Card ${currentIndex + 1} of ${total}`;
  const pct = ((currentIndex) / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function submitAnswer() {
  submitted = true;
  const ta = document.getElementById('card-textarea');
  ta.disabled = true;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-see-answer').style.display = 'inline-block';
}

function flipCard() {
  isFlipped = true;
  document.getElementById('flip-card').classList.add('flipped');
  document.getElementById('btn-flip-back').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'inline-block';
  // Update progress bar to show current card complete
  const pct = ((currentIndex + 1) / currentDeck.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function flipBack() {
  isFlipped = false;
  document.getElementById('flip-card').classList.remove('flipped');
  document.getElementById('btn-flip-back').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
}

function nextCard() {
  currentIndex++;
  if (currentIndex >= currentDeck.length) {
    showEndScreen();
  } else {
    showCard();
  }
}

// ============================================================
// END SCREEN
// ============================================================

function showEndScreen() {
  const total = currentDeck.length;
  document.getElementById('end-subtitle').textContent = `You reviewed all ${total} cards in this deck.`;
  // Ensure progress bar is full
  document.getElementById('progress-bar').style.width = '100%';
  showScreen('end-screen');
}

function restartDeck() {
  currentIndex = 0;
  applyTheme(currentCategory);
  showCard();
  showScreen('card-screen');
}

</script>
