<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roots Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; min-height: 100vh; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; padding: 24px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* LANDING */
  #landing { background: #F8FAFC; }
  .landing-title { font-size: 2.2rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; text-align: center; }
  .landing-subtitle { font-size: 1rem; color: #64748B; margin-bottom: 48px; text-align: center; }
  .landing-buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 380px; }
  .btn-landing { padding: 20px 32px; border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; color: white; letter-spacing: 0.02em; }
  .btn-landing:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .btn-landing:active { transform: translateY(0); }
  .btn-prefix { background: #3B82F6; }
  .btn-suffix { background: #10B981; }
  .btn-bases { background: #F59E0B; }

  /* SUBMENU */
  #base-submenu { background: #FFFBEB; }
  .submenu-title { font-size: 1.8rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; text-align: center; }
  .submenu-subtitle { font-size: 0.95rem; color: #64748B; margin-bottom: 36px; text-align: center; }
  .submenu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 380px; }
  .btn-group { padding: 16px 24px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; background: #F59E0B; color: white; transition: transform 0.15s, box-shadow 0.15s; }
  .btn-group:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(245,158,11,0.3); }
  .btn-group:active { transform: translateY(0); }
  .btn-back { padding: 12px 24px; border: 2px solid #D1D5DB; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: white; color: #374151; margin-top: 8px; transition: background 0.15s; }
  .btn-back:hover { background: #F9FAFB; }

  /* CARD SCREEN */
  #card-screen { background: #F8FAFC; padding: 16px; }
  .card-header { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .progress-text { font-size: 0.9rem; font-weight: 600; color: #64748B; }
  .progress-bar-container { width: 100%; max-width: 600px; height: 6px; background: #E2E8F0; border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  /* FLIP CARD */
  .flip-card-wrapper { width: 100%; max-width: 600px; perspective: 1200px; margin-bottom: 24px; }
  .flip-card { position: relative; width: 100%; min-height: 380px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .flip-card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; min-height: 380px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; padding: 36px 32px; display: flex; flex-direction: column; }
  .card-front { background: white; border: 3px solid #E2E8F0; }
  .card-back { background: white; border: 3px solid #E2E8F0; transform: rotateY(180deg); }

  /* Dynamic border color via JS */
  .card-face.themed { border-color: var(--cat-color); }

  .card-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 12px; }
  .card-root { font-size: 3rem; font-weight: 900; color: #1E293B; margin-bottom: 24px; letter-spacing: -0.02em; }
  .card-prompt { font-size: 0.9rem; color: #64748B; margin-bottom: 12px; font-style: italic; }
  .card-textarea { width: 100%; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 10px; font-size: 1rem; font-family: inherit; resize: none; min-height: 90px; color: #1E293B; transition: border-color 0.2s; outline: none; }
  .card-textarea:focus { border-color: var(--cat-color, #3B82F6); }
  .card-textarea:disabled { background: #F8FAFC; color: #64748B; cursor: not-allowed; }
  .btn-see-answer { margin-top: 12px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s, transform 0.15s; align-self: flex-start; }
  .btn-see-answer:hover { opacity: 0.9; transform: translateY(-1px); }

  /* BACK FACE */
  .card-meaning-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 4px; }
  .card-meaning { font-size: 1.4rem; font-weight: 800; color: #1E293B; margin-bottom: 20px; }
  .card-sentences-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #94A3B8; margin-bottom: 10px; }
  .card-sentence { font-size: 0.95rem; color: #374151; line-height: 1.6; padding: 10px 14px; background: var(--cat-bg, #EFF6FF); border-radius: 8px; margin-bottom: 8px; }

  /* CARD ACTIONS */
  .card-actions { width: 100%; max-width: 600px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-flip-back { padding: 12px 24px; border: 2px solid #D1D5DB; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; background: white; color: #374151; transition: background 0.15s; }
  .btn-flip-back:hover { background: #F9FAFB; }
  .btn-next { padding: 12px 28px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s, transform 0.15s; }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* HOME BUTTON */
  .btn-home { position: fixed; top: 16px; left: 16px; padding: 8px 16px; border: 2px solid #D1D5DB; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: white; color: #374151; z-index: 100; transition: background 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; }
  .btn-home:hover { background: #F9FAFB; }
  .btn-home.visible { display: block; }

  /* END SCREEN */
  .end-card { background: white; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .end-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .end-title { font-size: 1.8rem; font-weight: 800; color: #1E293B; margin-bottom: 8px; }
  .end-subtitle { font-size: 1rem; color: #64748B; margin-bottom: 32px; }
  .end-buttons { display: flex; flex-direction: column; gap: 12px; }
  .btn-restart { padding: 14px 28px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; background: var(--cat-color, #3B82F6); color: white; transition: opacity 0.15s; }
  .btn-restart:hover { opacity: 0.9; }
  .btn-end-home { padding: 14px 28px; border: 2px solid #D1D5DB; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; background: white; color: #374151; transition: background 0.15s; }
  .btn-end-home:hover { background: #F9FAFB; }
</style>
</head>
<body>

<!-- HOME BUTTON (always visible on non-landing screens) -->
<button class="btn-home" id="btn-home" onclick="goHome()">← Home</button>

<!-- LANDING SCREEN -->
<div class="screen active" id="landing">
  <div class="landing-title">Roots Flashcards</div>
  <div class="landing-subtitle">Master prefixes, suffixes, and bases</div>
  <div class="landing-buttons">
    <button class="btn-landing btn-prefix" onclick="startDeck('prefixes')">Prefixes</button>
    <button class="btn-landing btn-suffix" onclick="startDeck('suffixes')">Suffixes</button>
    <button class="btn-landing btn-bases" onclick="showBaseSubmenu()">Bases</button>
  </div>
</div>

<!-- BASE SUBMENU SCREEN -->
<div class="screen" id="base-submenu">
  <div class="submenu-title">Bases</div>
  <div class="submenu-subtitle">Choose a group to study</div>
  <div class="submenu-buttons">
    <button class="btn-group" onclick="startBaseGroup(0,49)">Group 1 — Most Common (1–50)</button>
    <button class="btn-group" onclick="startBaseGroup(50,99)">Group 2 (51–100)</button>
    <button class="btn-group" onclick="startBaseGroup(100,149)">Group 3 (101–150)</button>
    <button class="btn-group" onclick="startBaseGroup(150,199)">Group 4 (151–200)</button>
    <button class="btn-group" onclick="startBaseGroup(200,249)">Group 5 (201–250)</button>
    <button class="btn-group" onclick="startBaseGroup(250,297)">Group 6 (251–298)</button>
    <button class="btn-back" onclick="goHome()">← Back</button>
  </div>
</div>

<!-- CARD SCREEN -->
<div class="screen" id="card-screen">
  <div class="card-header">
    <span class="progress-text" id="progress-text">Card 1 of 50</span>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="flip-card-wrapper">
    <div class="flip-card" id="flip-card">
      <!-- FRONT -->
      <div class="card-face card-front" id="card-front">
        <div class="card-label" id="front-label">PREFIX</div>
        <div class="card-root" id="card-root">UN-</div>
        <div class="card-prompt">Write some example words using this root separated by commas</div>
        <textarea class="card-textarea" id="card-textarea" placeholder=""></textarea>
        <button class="btn-see-answer" id="btn-see-answer" onclick="flipCard()">See the answer →</button>
      </div>
      <!-- BACK -->
      <div class="card-face card-back" id="card-back">
        <div class="card-meaning-label">Meaning</div>
        <div class="card-meaning" id="card-meaning">not</div>
        <div class="card-sentences-label">Example Sentences</div>
        <div class="card-sentence" id="card-sentence-1"></div>
        <div class="card-sentence" id="card-sentence-2"></div>
      </div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-flip-back" id="btn-flip-back" onclick="flipBack()" style="display:none">← Flip Back</button>
    <button class="btn-next" id="btn-next" onclick="nextCard()" style="display:none">Next Card →</button>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen" id="end-screen">
  <div class="end-card">
    <div class="end-icon">🎉</div>
    <div class="end-title">Deck Complete!</div>
    <div class="end-subtitle" id="end-subtitle">You reviewed all the cards.</div>
    <div class="end-buttons">
      <button class="btn-restart" onclick="restartDeck()">Start Over</button>
      <button class="btn-end-home" onclick="goHome()">← Home</button>
    </div>
  </div>
</div>


<script>
// ============================================================
// DATA
// ============================================================

const PREFIXES = [
  { root: "UN-", meaning: "not", s1: "The senator's <strong>unethical</strong> conduct was widely condemned and proved impossible to condone.", s2: "Her <strong>unprecedented</strong> approach to the problem was so cogent that it impressed the entire team." },
  { root: "RE-", meaning: "again", s1: "After the results were disparaged, the scientist resolved to <strong>redo</strong> the experiment with meticulous care.", s2: "The city hired contractors to <strong>rebuild</strong> the bridge, a daunting task after the catastrophic flood." },
  { root: "IN-, IL-, IM-, IR-", meaning: "in or not", s1: "The judge declared the contract <strong>invalid</strong> because the missing signatures rendered it tenuous at best.", s2: "His <strong>inability</strong> to focus, compounded by his indolent habits, cost him the promotion." },
  { root: "DIS-", meaning: "apart, away", s1: "The new evidence seemed to <strong>discredit</strong> the prosecution's case and exposed its perfidious tactics.", s2: "She tried to <strong>disguise</strong> her despondent mood behind a forced smile." },
  { root: "PRE-, PRO-", meaning: "before", s1: "The prudent professor asked students to <strong>preview</strong> the chapter before the seminar.", s2: "A propitious start and proper <strong>preparation</strong> prevent poor performance." },
  { root: "DE-", meaning: "down, from", s1: "Rising temperatures are beginning to <strong>degrade</strong> the once-pristine coral reef ecosystem.", s2: "The culpable official was forced to <strong>depart</strong> from his position in ignominious disgrace." },
  { root: "INTER-", meaning: "between", s1: "The two nations signed an <strong>international</strong> trade accord after contentious negotiations.", s2: "The professor encouraged gregarious <strong>interaction</strong> between students during seminars." },
  { root: "TRANS-", meaning: "across", s1: "The adroit surgeon performed a complex <strong>transplant</strong> with impeccable precision.", s2: "<strong>Translating</strong> poetry demands an erudite grasp of both languages and cultures." },
  { root: "OVER- / HYPER-", meaning: "excess", s1: "Critics argued that the banal film was egregiously <strong>overhyped</strong> before its release.", s2: "Her <strong>hyperactive</strong> imagination made her an exceptionally ingenious storyteller." },
  { root: "SUPER-", meaning: "exceed, over", s1: "The <strong>superhuman</strong> fortitude required to summit Everest is difficult to comprehend.", s2: "The new model is demonstrably <strong>superior</strong> to anything previously on the market." },
  { root: "ANTI-", meaning: "against, opposite", s1: "The town organized a fervent <strong>antiwar</strong> demonstration in the central plaza.", s2: "She took an <strong>antihistamine</strong> to mitigate her relentless allergy symptoms." },
  { root: "MULTI-", meaning: "many", s1: "The company adopted a pragmatic <strong>multilingual</strong> customer service policy.", s2: "His <strong>multifaceted</strong> personality made him popular in every social circle." },
  { root: "MICRO-", meaning: "small", s1: "Scientists used a <strong>microscope</strong> to make an incisive study of the bacterial cells.", s2: "The <strong>microchip</strong> revolutionized an industry once thought to have reached its zenith." },
  { root: "AUTO-", meaning: "self", s1: "The <strong>automobile</strong> utterly transformed how people travel and live.", s2: "She wrote a candid <strong>autobiography</strong> detailing her journey from poverty to acclaim." },
  { root: "CO-, COM-, CON-", meaning: "with", s1: "The two researchers decided to <strong>collaborate</strong> on the seminal study.", s2: "The <strong>construction</strong> of the new stadium proved an onerous, three-year undertaking." },
  { root: "SUB-", meaning: "below", s1: "The <strong>submarine</strong> navigated silently and surreptitiously beneath the Arctic ice.", s2: "On her meager budget she could find only a <strong>substandard</strong> apartment." },
  { root: "MIS-", meaning: "against, wrong", s1: "He <strong>misunderstood</strong> the directions and wandered miles off course.", s2: "The politician's <strong>misstep</strong> proved an embarrassing debacle in the polls." },
  { root: "NON-", meaning: "not", s1: "The philanthropic organization was granted <strong>nonprofit</strong> status by the government.", s2: "The <strong>nonfiction</strong> section of the library was her favorite place to browse." },
  { root: "POST-", meaning: "after", s1: "The country endured a daunting <strong>postwar</strong> economic recovery for decades.", s2: "Doctors prescribed a prudent <strong>postoperative</strong> regimen of rest and light exercise." },
  { root: "EN-, EM-", meaning: "in", s1: "The munificent new policy was designed to <strong>empower</strong> local communities.", s2: "The artist sought to <strong>encapsulate</strong> the ephemeral spirit of the era in one painting." },
  { root: "POLY-", meaning: "many", s1: "The erudite <strong>polyglot</strong> spoke seven languages with eloquent fluency.", s2: "<strong>Polygamy</strong> is proscribed in most countries around the world." },
  { root: "MONO-", meaning: "one", s1: "The lecturer's <strong>monotone</strong> delivery was so soporific it lulled half the audience to sleep.", s2: "A <strong>monopoly</strong> stifles competition and is pernicious to consumers." },
  { root: "BI-", meaning: "two", s1: "<strong>Bilingual</strong> children often demonstrate greater cognitive flexibility.", s2: "The <strong>bicycle</strong> was the ubiquitous mode of transport for working-class families." },
  { root: "TELE-", meaning: "distant", s1: "The <strong>telescope</strong> allowed astronomers to discern faint, distant galaxies.", s2: "<strong>Television</strong> transformed how people received news and entertainment." },
  { root: "EXTRA-", meaning: "outside", s1: "Her <strong>extraordinary</strong>, almost precocious talent was recognized at a very young age.", s2: "The mission's details were kept surreptitiously <strong>extraneous</strong> to the public record." },
  { root: "MACRO-, MEGA-", meaning: "large", s1: "Economists scrutinize <strong>macroeconomic</strong> trends to anticipate looming recessions.", s2: "The teeming <strong>megacity</strong> of Tokyo houses over thirty million people." },
  { root: "CIRCUM-", meaning: "around", s1: "The ship completed its <strong>circumnavigation</strong> of the globe in record time.", s2: "<strong>Circumspect</strong> leaders prudently weigh all consequences before acting." },
  { root: "META-", meaning: "change", s1: "<strong>Metamorphosis</strong> describes the dramatic, almost magical transformation insects undergo.", s2: "The author's incisive use of <strong>metaphor</strong> elevated the text beyond its literal meaning." },
  { root: "OMNI-", meaning: "all", s1: "The <strong>omniscient</strong> narrator discerns the secret thoughts of every character.", s2: "An <strong>omnivore</strong> consumes both plants and animals." },
  { root: "PAN-", meaning: "all", s1: "The <strong>pandemic</strong> spread with inexorable speed across every continent.", s2: "A breathtaking <strong>panoramic</strong> view of the valley stretched out before the hikers." },
  { root: "SYM-, SYN-", meaning: "same, together", s1: "A <strong>symphony</strong> brings dozens of instruments together into one coherent sound.", s2: "The doctors used a <strong>synonym</strong> chart to lend clarity to the patient's diagnosis." },
  { root: "PSEUDO-", meaning: "false", s1: "The <strong>pseudoscientific</strong> claims in the article were specious and lacked any credible evidence.", s2: "He used a <strong>pseudonym</strong> to publish his early poetry anonymously." },
  { root: "CONTRA-", meaning: "against", s1: "Her later actions seemed to flagrantly <strong>contradict</strong> everything she had previously said.", s2: "The <strong>contraband</strong> was discovered surreptitiously hidden in a false compartment." },
  { root: "EQUI-", meaning: "equal", s1: "The two sides reached an <strong>equitable</strong> settlement after months of contentious negotiation.", s2: "The gymnast maintained her <strong>equilibrium</strong> with remarkable equanimity on the narrow beam." },
  { root: "A-, AN-", meaning: "not, without", s1: "The patient was described as <strong>apathetic</strong>, listless, and withdrawn.", s2: "<strong>Anarchy</strong> erupted in the streets after the government's ignominious collapse." },
  { root: "HETERO-", meaning: "different", s1: "The <strong>heterogeneous</strong> group brought together people of disparate backgrounds.", s2: "A <strong>heterodox</strong> thinker is an iconoclast who challenges conventional wisdom." },
  { root: "HOMO-", meaning: "same", s1: "The <strong>homogeneous</strong> mixture contained only one immutable type of substance.", s2: "<strong>Homogenized</strong> milk is processed so the fat is evenly distributed." },
  { root: "PERI-", meaning: "all around", s1: "The vigilant guard patrolled the <strong>perimeter</strong> of the field all night.", s2: "<strong>Peripheral</strong> vision allows us to discern movement at the edges of our sight." },
  { root: "FORE-", meaning: "before", s1: "The detective had an ominous <strong>foreboding</strong> that something was gravely wrong.", s2: "<strong>Foresight</strong> is a more sagacious virtue than any amount of hindsight." },
  { root: "UNI-", meaning: "one", s1: "The country adopted a <strong>uniform</strong> national curriculum for all its schools.", s2: "A <strong>unicorn</strong> is a mythical creature with a single horn." },
  { root: "NEO-", meaning: "new", s1: "The austere <strong>neoclassical</strong> building featured columns and symmetrical facades.", s2: "Her ingenious <strong>neologism</strong> for the phenomenon was quickly adopted online." },
  { root: "PROT-", meaning: "first", s1: "The <strong>prototype</strong> for the new phone was unveiled to acclaim at the tech conference.", s2: "<strong>Protein</strong> is essential because amino acids are the building blocks of life." },
  { root: "AMBI-, AMPHI-", meaning: "both", s1: "He was <strong>ambidextrous</strong> and adroit enough to write equally well with either hand.", s2: "She felt <strong>ambivalent</strong> about accepting the prestigious but onerous position." },
  { root: "E-, EX-", meaning: "outer, exit", s1: "The company resolved to <strong>export</strong> its products to lucrative new markets abroad.", s2: "His <strong>exclamation</strong> of surprise echoed through the empty, austere hall." },
  { root: "ANTE-", meaning: "before", s1: "The <strong>antechamber</strong> served as a waiting room before the venerable main hall.", s2: "<strong>Antebellum</strong> architecture is a salient feature of the old Southern estates." },
  { root: "INTR-", meaning: "within", s1: "She is an <strong>introvert</strong> who finds gregarious social gatherings exhausting.", s2: "<strong>Introspection</strong> is the lucid examination of one's own thoughts and feelings." },
  { root: "DI-, DIS-", meaning: "apart, away", s1: "The two paths <strong>diverged</strong> at the edge of the forest, leaving the hikers irresolute.", s2: "The <strong>dilemma</strong> left her unable to choose between two equally compelling options." },
  { root: "DYS-", meaning: "bad", s1: "<strong>Dyslexia</strong> affects how some individuals process written language.", s2: "A <strong>dysfunctional</strong> family environment can have insidious, lasting effects on a child." },
  { root: "EPI-", meaning: "after", s1: "The <strong>epilogue</strong> revealed the characters' fates years later.", s2: "An <strong>epidemic</strong> of influenza swept inexorably through the city that winter." },
  { root: "EU-", meaning: "good", s1: "The eloquent <strong>eulogy</strong> delivered at the funeral moved the entire audience to tears.", s2: "<strong>Euphoria</strong>, ebullient and contagious, swept through the crowd as the buzzer sounded." },
  { root: "ALT-", meaning: "other", s1: "The <strong>alternate</strong> route added a vexing twenty minutes to the commute.", s2: "An <strong>altruistic</strong>, magnanimous person places others' welfare above their own." },
  { root: "AB-", meaning: "from", s1: "She was <strong>absent</strong> from school for an entire week due to illness.", s2: "The <strong>abstract</strong> painting provoked vehement reactions from gallery visitors." },
  { root: "DI-, DU-", meaning: "two", s1: "The <strong>duplex</strong> housed two families on opposite sides of the building.", s2: "A <strong>duet</strong> requires two performers working in impeccable harmony." },
  { root: "BE-", meaning: "make", s1: "The knight was <strong>bequeathed</strong> a vast estate by his magnanimous king.", s2: "Her ebullient demeanor <strong>befriended</strong> everyone she met." },
  { root: "BY-", meaning: "near", s1: "The vigilant <strong>bystander</strong> filmed the incident on his phone.", s2: "They took a <strong>bypass</strong> to circumvent the congested downtown area." },
  { root: "IR-", meaning: "not", s1: "The <strong>irreversible</strong> damage to the ecosystem alarmed scientists worldwide.", s2: "Her <strong>irresponsible</strong>, profligate spending led to serious financial problems." },
  { root: "NE-, NEG-", meaning: "not", s1: "He gave a caustic, <strong>negative</strong> review of the film in his weekly column.", s2: "<strong>Negligence</strong> in the workplace can lead to egregious accidents." },
  { root: "OFF-", meaning: "from", s1: "The <strong>offshoot</strong> of the organization was established to address local issues.", s2: "An <strong>offhand</strong>, pejorative remark unintentionally offended several colleagues." },
  { root: "RE-, RETRO-", meaning: "back", s1: "<strong>Retrofitting</strong> venerable old buildings with modern insulation conserves energy.", s2: "The <strong>retrospective</strong> exhibit traced the artist's prolific development over four decades." },

// ============================================================
// APP STATE
// ============================================================

const CATEGORY_COLORS = {
  prefixes: { color: '#3B82F6', bg: '#EFF6FF', label: 'PREFIX' },
  suffixes: { color: '#10B981', bg: '#ECFDF5', label: 'SUFFIX' },
  bases:    { color: '#F59E0B', bg: '#FFFBEB', label: 'BASE' }
};

let currentDeck = [];
let currentIndex = 0;
let currentCategory = 'prefixes';
let isFlipped = false;
let savedDeckStart = 0;
let savedDeckEnd = 0;

// ============================================================
// NAVIGATION
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const homeBtn = document.getElementById('btn-home');
  homeBtn.classList.toggle('visible', id !== 'landing');
}

function goHome() {
  showScreen('landing');
}

function showBaseSubmenu() {
  showScreen('base-submenu');
}

function startDeck(category) {
  currentCategory = category;
  let deck;
  if (category === 'prefixes') deck = PREFIXES;
  else if (category === 'suffixes') deck = SUFFIXES;
  else deck = BASES;
  currentDeck = deck;
  currentIndex = 0;
  applyTheme(category);
  showCard();
  showScreen('card-screen');
}

function startBaseGroup(start, end) {
  currentCategory = 'bases';
  currentDeck = BASES.slice(start, end + 1);
  savedDeckStart = start;
  savedDeckEnd = end;
  currentIndex = 0;
  applyTheme('bases');
  showCard();
  showScreen('card-screen');
}

// ============================================================
// THEME
// ============================================================

function applyTheme(category) {
  const theme = CATEGORY_COLORS[category];
  document.documentElement.style.setProperty('--cat-color', theme.color);
  document.documentElement.style.setProperty('--cat-bg', theme.bg);
  // Apply themed border to card faces
  document.querySelectorAll('.card-face').forEach(el => {
    el.style.borderColor = theme.color;
  });
  // Color progress bar
  document.getElementById('progress-bar').style.background = theme.color;
}

// ============================================================
// CARD DISPLAY
// ============================================================

function showCard() {
  const card = currentDeck[currentIndex];
  const theme = CATEGORY_COLORS[currentCategory];
  const total = currentDeck.length;

  // Reset flip state
  isFlipped = false;
  document.getElementById('flip-card').classList.remove('flipped');

  // Front content
  document.getElementById('front-label').textContent = theme.label;
  document.getElementById('card-root').textContent = card.root;

  // Reset textarea
  const ta = document.getElementById('card-textarea');
  ta.value = '';
  ta.disabled = false;
  ta.style.borderColor = '';

  // Back content
  document.getElementById('card-meaning').textContent = card.meaning;
  document.getElementById('card-sentence-1').innerHTML = card.s1;
  document.getElementById('card-sentence-2').innerHTML = card.s2;

  // Hide flip-back and next on fresh card
  document.getElementById('btn-flip-back').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  // Progress
  document.getElementById('progress-text').textContent = `Card ${currentIndex + 1} of ${total}`;
  const pct = ((currentIndex) / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function flipCard() {
  isFlipped = true;
  document.getElementById('card-textarea').disabled = true;
  document.getElementById('flip-card').classList.add('flipped');
  document.getElementById('btn-flip-back').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'inline-block';
  // Update progress bar to show current card complete
  const pct = ((currentIndex + 1) / currentDeck.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function flipBack() {
  isFlipped = false;
  document.getElementById('flip-card').classList.remove('flipped');
  document.getElementById('btn-flip-back').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
}

function nextCard() {
  currentIndex++;
  if (currentIndex >= currentDeck.length) {
    showEndScreen();
  } else {
    showCard();
  }
}

// ============================================================
// END SCREEN
// ============================================================

function showEndScreen() {
  const total = currentDeck.length;
  document.getElementById('end-subtitle').textContent = `You reviewed all ${total} cards in this deck.`;
  // Ensure progress bar is full
  document.getElementById('progress-bar').style.width = '100%';
  showScreen('end-screen');
}

function restartDeck() {
  currentIndex = 0;
  applyTheme(currentCategory);
  showCard();
  showScreen('card-screen');
}

</script>
</body>
</html>
